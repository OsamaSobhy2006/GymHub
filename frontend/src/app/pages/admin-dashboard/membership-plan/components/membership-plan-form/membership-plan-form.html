<div class="modal-backdrop">
    <div class="member-modal">
        <div class="modal-header">
            <h3>{{ plan ? 'Edit Membership Plan' : 'Add Membership Plan' }}</h3>
            <button type="button" class="close-btn" (click)="cancel()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()">

            <div class="form-group">
                <label>Plan Name</label>
                <input type="text" formControlName="name" placeholder="Enter plan name">
                @if(form.controls.name.touched && form.controls.name.invalid){
                    <small class="error">Plan name must be at least 3 characters.</small>
                }
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea rows="4" formControlName="description" placeholder="Enter plan description"></textarea>
                @if(form.controls.description.touched && form.controls.description.invalid){
                    <small class="error">Description must be at least 10 characters.</small>
                }
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Price (EGP)</label>
                    <input type="number" formControlName="price">
                </div>

                <div class="form-group">
                    <label>Duration (Days)</label>
                    <input type="number" formControlName="durationInDays">
                </div>
            </div>

            <div class="buttons">
                <button type="button" class="cancel-btn" (click)="cancel()">
                    Cancel
                </button>

                <button type="submit" class="save-btn" [disabled]="isLoading()">
                    @if(isLoading()){
                        <span class="spinner-border spinner-border-sm"></span>
                    }@else{
                        {{ plan ? 'Save Changes' : 'Create Plan' }}
                    }
                </button>
            </div>

        </form>
    </div>
</div>
