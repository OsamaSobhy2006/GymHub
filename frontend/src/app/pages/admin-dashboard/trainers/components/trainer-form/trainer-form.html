<div class="modal-backdrop">

    <div class="member-modal">

        <div class="modal-header">

            <h3>Edit Trainer</h3>

            <button
                type="button"
                class="close-btn"
                (click)="cancel()">

                <i class="bi bi-x-lg"></i>

            </button>

        </div>

        <form
            [formGroup]="form"
            (ngSubmit)="submit()">

            <div class="form-group">

                <label>Full Name</label>

                <input
                    type="text"
                    formControlName="fullname"
                    placeholder="Enter trainer full name">

                @if(form.controls.fullname.touched &&
                form.controls.fullname.invalid){

                    <small class="error">

                        Full name must be at least 3 characters.

                    </small>

                }

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    formControlName="email"
                    placeholder="Enter trainer email">

                @if(form.controls.email.touched &&
                form.controls.email.invalid){

                    <small class="error">

                        Please enter a valid email.

                    </small>

                }

            </div>

            <div class="buttons">

                <button
                    type="button"
                    class="cancel-btn"
                    (click)="cancel()">

                    Cancel

                </button>

                <button
                    type="submit"
                    class="save-btn"
                    [disabled]="isLoading()">

                    @if(isLoading()){

                        <span class="spinner-border spinner-border-sm"></span>

                    }

                    @else{

                        Save Changes

                    }

                </button>

            </div>

        </form>

    </div>

</div>
